<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image2生图工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#6366F1',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .btn-option {
            @apply px-4 py-2 rounded-full border border-gray-200 text-sm transition-all hover:border-primary cursor-pointer;
        }
        .btn-option.active {
            @apply bg-primary text-white border-primary;
        }
        .slider-style {
            @apply w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-primary mb-2">Image2 生图</h1>
            <p class="text-gray-500 text-sm">本地服务 · 自动下载 · 自动保存配置</p>
        </div>

        <div class="flex gap-6">
            <div class="w-64 flex-shrink-0">
                <div class="bg-white rounded-2xl p-4 shadow-lg">
                    <h3 class="font-bold text-gray-700 mb-3">历史记录</h3>
                    <div id="historyList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
            </div>

            <div class="flex-1 bg-white rounded-2xl p-6 shadow-lg">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                <div class="relative">
                    <input type="password" id="apiKey" class="w-full px-4 py-2 rounded-lg border pr-10">
                    <button type="button" id="toggleApiKey" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">提示词</label>
                <textarea id="prompt" rows="3" class="w-full px-4 py-2 rounded-lg border"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">参考图片</label>
                <input type="file" id="imageFile" accept="image/*" multiple class="hidden">
                <label for="imageFile" class="bg-gray-100 px-4 py-2 rounded-lg text-sm cursor-pointer">上传图片</label>
                <input type="text" id="imageUrls" class="w-full mt-2 px-3 py-2 rounded-lg border text-sm">
                <div id="previewArea" class="flex flex-wrap gap-2 mt-2"></div>
            </div>

            <div class="mb-5">
                <label class="block mb-2 text-sm">分辨率</label>
                <div class="flex gap-2">
                    <button class="btn-option res-btn" data-val="1k">1K</button>
                    <button class="btn-option res-btn" data-val="2k">2K</button>
                    <button class="btn-option res-btn" data-val="4k">4K</button>
                </div>
                <input type="hidden" id="resolution" value="1k">
            </div>

            <div class="mb-5">
                <label class="block mb-2 text-sm">比例</label>
                <div class="flex gap-2">
                    <button class="btn-option ratio-btn" data-val="1:1">1:1</button>
                    <button class="btn-option ratio-btn" data-val="3:2">3:2</button>
                    <button class="btn-option ratio-btn" data-val="2:3">2:3</button>
                </div>
                <input type="hidden" id="aspectRatio" value="1:1">
            </div>

            <div class="mb-5">
                <label class="block mb-2 text-sm">画质</label>
                <div class="flex gap-2">
                    <button class="btn-option quality-btn" data-val="low">低</button>
                    <button class="btn-option quality-btn active" data-val="medium">中</button>
                    <button class="btn-option quality-btn" data-val="high">高</button>
                </div>
                <input type="hidden" id="quality" value="medium">
            </div>

            <div class="mb-5">
                <label class="block mb-2 text-sm">格式</label>
                <div class="flex gap-2">
                    <button class="btn-option fmt-btn active" data-val="png">PNG</button>
                    <button class="btn-option fmt-btn" data-val="jpeg">JPG</button>
                    <button class="btn-option fmt-btn" data-val="webp">WEBP</button>
                </div>
                <input type="hidden" id="outputFormat" value="png">
            </div>

            <div class="mb-6 p-4 bg-gray-50 rounded-xl">
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="useCustomSize">
                    <label>启用自定义尺寸</label>
                </div>
                <div id="customSizeWrap" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs">宽度</label>
                        <input type="number" id="width" value="1024" class="w-full border px-2 py-1 rounded">
                        <input type="range" min="256" max="4096" value="1024" class="slider-style" id="widthSlider">
                    </div>
                    <div>
                        <label class="text-xs">高度</label>
                        <input type="number" id="height" value="1024" class="w-full border px-2 py-1 rounded">
                        <input type="range" min="256" max="4096" value="1024" class="slider-style" id="heightSlider">
                    </div>
                </div>
                <input type="hidden" id="size">
            </div>

            <button id="submitBtn" class="w-full bg-primary text-white py-3 rounded-lg">开始生成</button>
        </div>

        <div id="resultArea" class="hidden mt-8 bg-white p-6 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-2">
                <div id="taskStatus"></div>
                <button id="clearBtn" class="hidden px-4 py-1 bg-gray-200 hover:bg-gray-300 rounded-lg text-sm">清空</button>
            </div>
            <img id="generatedImg" class="w-full rounded-xl hidden">
        </div>
        </div>
    </div>

<script>
const API_BASE = 'http://localhost:2828/api';
let taskId = null;
let interval = null;
let currentHistoryKey = null;

function saveHistory(prompt, imgUrl, config){
    const history = JSON.parse(localStorage.getItem('img_history') || '[]');
    const item = {
        time: new Date().toLocaleString(),
        prompt,
        imgUrl,
        config
    };
    history.unshift(item);
    if(history.length > 20) history.pop();
    localStorage.setItem('img_history', JSON.stringify(history));
    renderHistory();
    return item;
}

function renderHistory(){
    const history = JSON.parse(localStorage.getItem('img_history') || '[]');
    const list = document.getElementById('historyList');
    list.innerHTML = history.map((item, i) => `
        <div class="history-item p-2 rounded-lg hover:bg-gray-100 cursor-pointer border" data-idx="${i}">
            <div class="text-xs text-gray-400">${item.time}</div>
            <div class="text-sm truncate">${item.prompt}</div>
            <img src="${item.imgUrl}" class="w-full h-20 object-cover rounded mt-1">
        </div>
    `).join('');
    list.querySelectorAll('.history-item').forEach(el => {
        el.onclick = () => loadHistory(+el.dataset.idx);
    });
}

function loadHistory(idx){
    const history = JSON.parse(localStorage.getItem('img_history') || '[]');
    const item = history[idx];
    if(!item) return;
    const cfg = item.config;
    document.getElementById('prompt').value = item.prompt;
    document.getElementById('resolution').value = cfg.resolution;
    document.getElementById('aspectRatio').value = cfg.aspectRatio;
    document.getElementById('quality').value = cfg.quality;
    document.getElementById('outputFormat').value = cfg.outputFormat;
    document.getElementById('useCustomSize').checked = cfg.useCustomSize;
    document.getElementById('width').value = cfg.width;
    document.getElementById('height').value = cfg.height;
    document.getElementById('customSizeWrap').classList.toggle('hidden', !cfg.useCustomSize);
    syncSize();
    updateButtonStyles();
    const resultArea = document.getElementById('resultArea');
    resultArea.classList.remove('hidden');
    document.getElementById('generatedImg').src = item.imgUrl;
    document.getElementById('generatedImg').classList.remove('hidden');
    document.getElementById('clearBtn').classList.remove('hidden');
    document.getElementById('taskStatus').innerHTML = '✅ 历史记录';
}

function clearInput(){
    document.getElementById('prompt').value = '';
    document.getElementById('imageUrls').value = '';
    document.getElementById('previewArea').innerHTML = '';
    document.getElementById('resultArea').classList.add('hidden');
    document.getElementById('generatedImg').classList.add('hidden');
    document.getElementById('clearBtn').classList.add('hidden');
    document.getElementById('taskStatus').innerHTML = '';
    currentHistoryKey = null;
}

document.getElementById('clearBtn').onclick = clearInput;

// API Key 显示/隐藏
document.getElementById('toggleApiKey').onclick = function(){
    const input = document.getElementById('apiKey');
    const icon = this.querySelector('i');
    if(input.type === 'password'){
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
};

const FIELDS = [
    'apiKey','prompt','imageUrls','resolution','aspectRatio',
    'size','quality','outputFormat','useCustomSize','width','height'
];

// 自动保存
FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', saveAll);
});

// 按钮选择
bindGroup('res-btn','resolution');
bindGroup('ratio-btn','aspectRatio');
bindGroup('quality-btn','quality');
bindGroup('fmt-btn','outputFormat');

function bindGroup(cls, targetId){
    document.querySelectorAll('.'+cls).forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.'+cls).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(targetId).value = btn.dataset.val;
            saveAll();
        }
    });
}

// 自定义尺寸开关
const useCustom = document.getElementById('useCustomSize');
const sizeWrap = document.getElementById('customSizeWrap');
useCustom.addEventListener('change', () => {
    sizeWrap.classList.toggle('hidden', !useCustom.checked);
    syncSize();
    saveAll();
});

// 尺寸双向绑定
const width = document.getElementById('width');
const height = document.getElementById('height');
const ws = document.getElementById('widthSlider');
const hs = document.getElementById('heightSlider');

function syncSize(){
    let w = +width.value || 1024;
    let h = +height.value || 1024;
    w = Math.max(256, Math.min(4096, w));
    h = Math.max(256, Math.min(4096, h));
    width.value = w; height.value = h;
    ws.value = w; hs.value = h;
    document.getElementById('size').value = useCustom.checked ? `${w}x${h}` : '';
}

width.addEventListener('input', syncSize);
height.addEventListener('input', syncSize);
ws.addEventListener('input', () => { width.value = ws.value; syncSize(); });
hs.addEventListener('input', () => { height.value = hs.value; syncSize(); });

// 保存
function saveAll(){
    FIELDS.forEach(id => {
        const el = document.getElementById(id);
        const v = el.type === 'checkbox' ? el.checked : el.value.trim();
        localStorage.setItem('cfg_'+id, v);
    });
}

// 加载
function loadAll(){
    FIELDS.forEach(id => {
        const v = localStorage.getItem('cfg_'+id);
        if(v == null) return;
        const el = document.getElementById(id);
        if(el.type === 'checkbox') el.checked = v === 'true';
        else el.value = v;
    });
    sizeWrap.classList.toggle('hidden', !useCustom.checked);
    syncSize();
    updateButtonStyles();
}

function updateButtonStyles(){
    ['res-btn','ratio-btn','quality-btn','fmt-btn'].forEach(cls => {
        const btns = document.querySelectorAll('.'+cls);
        btns.forEach(btn => {
            const targetId = cls === 'res-btn' ? 'resolution' :
                            cls === 'ratio-btn' ? 'aspectRatio' :
                            cls === 'quality-btn' ? 'quality' : 'outputFormat';
            const val = document.getElementById(targetId).value;
            if(btn.dataset.val === val) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    });
}

window.onload = () => {
    loadAll();
    renderHistory();
};

// 提交
document.getElementById('submitBtn').onclick = async () => {
    saveAll();
    const key = document.getElementById('apiKey').value.trim();
    const prompt = document.getElementById('prompt').value.trim();
    if(!key || !prompt) return alert('请填写完整');

    const body = {
        model: 'gpt-image-2-async',
        input: {
            prompt,
            quality: document.getElementById('quality').value,
            output_format: document.getElementById('outputFormat').value,
        }
    };

    const size = document.getElementById('size').value.trim();
    if(size){
        body.input.size = size;
    } else {
        body.input.resolution = document.getElementById('resolution').value;
        body.input.aspect_ratio = document.getElementById('aspectRatio').value;
    }

    const imgs = document.getElementById('imageUrls').value.trim();
    if(imgs) body.input.image_urls = imgs.split(',').map(i=>i.trim()).filter(Boolean);

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '提交中...';

    const res = await fetch(API_BASE+'/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey: key, body })
    });

    const data = await res.json();
    if(data.code !== 200){
        alert('失败：'+data.msg);
        btn.disabled = false; btn.textContent = '开始生成';
        return;
    }

    taskId = data.task_id;
    document.getElementById('resultArea').classList.remove('hidden');
    document.getElementById('taskStatus').innerHTML = '✅ 任务已提交，排队中...';
    btn.disabled = false; btn.textContent = '开始生成';
    startPoll(key);
};

function startPoll(key){
    if(interval) clearInterval(interval);
    interval = setInterval(async () => {
        const res = await fetch(API_BASE+'/task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ apiKey: key, taskId })
        });
        const data = await res.json();

        if(data.status === 'queued'){
            document.getElementById('taskStatus').innerHTML = '⌛ 排队中...';
        } else if(data.status === 'generating'){
            document.getElementById('taskStatus').innerHTML = '⚙️ 正在生成...';
        } else if(data.status === 'success'){
            clearInterval(interval);
            document.getElementById('taskStatus').innerHTML = '✅ 生成完成！已自动保存到本地文件夹';
            const img = document.getElementById('generatedImg');
            img.src = data.data[0].url;
            img.classList.remove('hidden');
            document.getElementById('clearBtn').classList.remove('hidden');
            const config = {
                resolution: document.getElementById('resolution').value,
                aspectRatio: document.getElementById('aspectRatio').value,
                quality: document.getElementById('quality').value,
                outputFormat: document.getElementById('outputFormat').value,
                useCustomSize: document.getElementById('useCustomSize').checked,
                width: document.getElementById('width').value,
                height: document.getElementById('height').value
            };
            saveHistory(document.getElementById('prompt').value.trim(), data.data[0].url, config);
        } else if(data.status === 'failed'){
            clearInterval(interval);
            document.getElementById('taskStatus').innerHTML = '❌ 失败：'+data.msg;
        }
    }, 5000);
}

// 图片上传转base64
document.getElementById('imageFile').addEventListener('change', async e => {
    const files = Array.from(e.target.files);
    const out = document.getElementById('imageUrls');
    for(const f of files){
        const b64 = await new Promise(r => {
            const fr = new FileReader();
            fr.onload = () => r(fr.result);
            fr.readAsDataURL(f);
        });
        if(out.value) out.value += ',';
        out.value += b64;
    }
    saveAll();
    e.target.value = '';
});
</script>
</body>
</html>
